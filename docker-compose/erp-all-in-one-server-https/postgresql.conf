# Bộ nhớ cache chính
shared_buffers = 2GB                # ~25% RAM, vừa đủ để tránh chiếm hết

# Bộ nhớ cho mỗi truy vấn
work_mem = 32MB                     # giảm xuống để tránh Odoo nhiều worker gây tràn RAM

# Cache hiệu quả (Postgres + OS)
effective_cache_size = 5GB          # ~60–65% RAM

# Số kết nối tối đa
max_connections = 200               # Odoo nhiều worker, tăng kết nối

# Song song hóa truy vấn
max_parallel_workers = 2            # bằng số core CPU
max_parallel_workers_per_gather = 2

# Autovacuum để tránh bloat
autovacuum = on
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# WAL và checkpoint
wal_buffers = 16MB
checkpoint_timeout = 15min
max_wal_size = 2GB
min_wal_size = 512MB

# Logging
log_statement = 'none'
log_min_duration_statement = 500

hba_file = '/etc/postgresql/pg_hba.conf'

