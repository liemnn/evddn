  version: '3.8'

  services:
    db:
      image: postgres:14.6
      container_name: postgres
      environment:
        POSTGRES_DB: erp
        POSTGRES_USER: erp
        POSTGRES_PASSWORD: ERP@123!@#
        TZ: Asia/Ho_Chi_Minh
        PGTZ: Asia/Ho_Chi_Minh
      volumes:
        - ./db_data:/var/lib/postgresql/data
        - ./postgresql.conf:/etc/postgresql/postgresql.conf
      ports:
        - "5432:5432"
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U erp -d erp -h localhost" ]
        interval: 10s
        retries: 10
      restart: always
      command: postgres -c listen_addresses='*' -c fsync=off -c full_page_writes=off

    redis:
      image: redis:7
      container_name: redis
      restart: always
      environment:
        - TZ=Asia/Ho_Chi_Minh

    odoo:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: erp
      depends_on:
        db:
          condition: service_healthy
        redis:
          condition: service_started
      volumes:
        - ./odoo/base:/usr/lib/python3/dist-packages/odoo/addons/base
        - ./odoo_data:/var/lib/odoo
        - ./addons:/mnt/extra-addons
        - ./odoo.conf:/etc/odoo/odoo.conf
        - ./entrypoint.sh:/entrypoint.sh:ro
      entrypoint: [ "/entrypoint.sh" ]
      ports:
        - "8069:8069"
        - "8072:8072"
      restart: always

    nginx:
      image: nginx:1.27
      container_name: odoo-nginx
      depends_on:
        - odoo
      ports:
        - "80:80"
        - "443:443"
      volumes:
        - ./nginx.conf:/etc/nginx/nginx.conf:ro
        - ./nginx/ssl:/etc/nginx/ssl:ro
        - ./nginx_logs:/var/log/nginx
      environment:
        - TZ=Asia/Ho_Chi_Minh
      restart: always

    coturn:
      image: instrumentisto/coturn
      container_name: coturn
      restart: unless-stopped
      volumes:
        - ./turn/turnserver.conf:/etc/turnserver.conf:ro
      ports:
        - "3478:3478/udp"
        - "3478:3478/tcp"
        - "49160-49200:49160-49200/udp"
      environment:
        - TZ=Asia/Ho_Chi_Minh


  volumes:
    odoo_data:
      driver: local
      driver_opts:
        type: none
        o: bind
        device: /opt/erp/odoo_data
