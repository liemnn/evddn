services:
  db:
    image: postgres:14.6
    container_name: postgres
    environment:
      POSTGRES_DB: erp
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: ERP@123!@#
      TZ: Asia/Ho_Chi_Minh         # Thiết lập timezone đúng
      PGTZ: Asia/Ho_Chi_Minh       # Dành riêng cho PostgreSQL
    volumes:
      - ./db_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./backup.sh:/backup.sh
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf

    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp -h localhost"]
      interval: 10s
      retries: 10
    restart: always
    command: postgres -c listen_addresses='*' -c fsync=off -c full_page_writes=off

  redis:
    image: redis:7
    container_name: redis
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh
volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/erp/db_data




