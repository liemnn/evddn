services:
  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp
    volumes:
      - ./odoo/base:/usr/lib/python3/dist-packages/odoo/addons/base
      - ./odoo_data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./odoo.conf:/etc/odoo/odoo.conf
      - ./entrypoint.sh:/entrypoint.sh:ro
    entrypoint: [ "/entrypoint.sh" ]
    ports:
      - "8069:8069"
      - "8072:8072"
    restart: always

  nginx:
    image: nginx:1.27
    container_name: odoo-nginx
    depends_on:
      - erp
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx_logs:/var/log/nginx

    environment:
      - TZ=Asia/Ho_Chi_Minh
    restart: always

volumes:
  odoo_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/erp/odoo_data




