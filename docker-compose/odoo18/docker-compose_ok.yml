services:
  db:
    image: postgres:16
    container_name: odoo-db
    environment:
      POSTGRES_DB: evddn
      POSTGRES_USER: evddn
      POSTGRES_PASSWORD: evddn@123!@#$%
      TZ: Asia/Ho_Chi_Minh         # Thiết lập timezone đúng
      PGTZ: Asia/Ho_Chi_Minh       # Dành riêng cho PostgreSQL
    volumes:
      - ./db_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./backup.sh:/backup.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evddn -d evddn -h localhost"]
      interval: 10s
      retries: 10
    restart: always
    command: postgres -c listen_addresses='*'

  redis:
    image: redis:7
    container_name: odoo-redis
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh

  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    image: odoo:18
    container_name: odoo18
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    user: "101:101"
    environment:
      HOST: db
      DB_NAME: evddn
      USER: evddn
      PASSWORD: evddn@123!@#$%
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ./odoo_data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./odoo.conf:/etc/odoo/odoo.conf
      - ./entrypoint.sh:/entrypoint.sh
    entrypoint: ["/entrypoint.sh"]
    ports:
      - "8080:8069"
      - "8072:8072"
    restart: always

  nginx:
    image: nginx:1.27
    container_name: odoo-nginx
    depends_on:
      - odoo
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx_logs:/var/log/nginx
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    environment:
      - TZ=Asia/Ho_Chi_Minh
    restart: always

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/odoo18/db_data

  odoo_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/odoo18/odoo_data


