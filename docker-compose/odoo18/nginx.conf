worker_processes auto;

events {
    worker_connections 4096;   # tăng để chịu tải cao hơn
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    ## Giới hạn header/URL
    client_header_buffer_size 16k;
    large_client_header_buffers 4 32k;

    ## Gzip config
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_buffers 16 8k;
    gzip_min_length 256;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/json
        application/ld+json
        image/svg+xml
        font/woff
        font/woff2
        application/font-woff
        application/font-woff2;

    ## Upstreams
    upstream odoo {
        server odoo:8069;
    }
    upstream odoochat {
        server odoo:8072;
    }

    ## HTTP → HTTPS redirect
    server {
        listen 80;
        server_name evddn.vn www.evddn.vn;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    ## HTTPS chính
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;  # Bật HTTP/2 ở một dòng riêng
        server_name evddn.vn www.evddn.vn;

        ssl_certificate     /etc/letsencrypt/live/evddn.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/evddn.vn/privkey.pem;
        ssl_dhparam         /etc/nginx/ssl/dhparam.pem;

        ## SSL config
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling off;
        ssl_stapling_verify off;
        resolver 8.8.8.8 1.1.1.1 valid=300s;

        ## Security headers (tối ưu cho Odoo)
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy no-referrer-when-downgrade;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        ## Proxy timeout & body size
        proxy_read_timeout  3600;
        proxy_connect_timeout 3600;
        proxy_send_timeout 3600;
        client_max_body_size 200M;

        ## Proxy buffering
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 32k;
        proxy_temp_file_write_size 32k;

        ## Cache Static Files (Giảm tải cho Odoo bằng Browser Cache)
        location ~* /web/static/ {
            proxy_buffering on;
            expires 864000;
            proxy_pass http://odoo;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        ## Odoo main
        location / {
            proxy_pass http://odoo;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        ## Odoo chat (websocket)
        location /websocket {
            proxy_pass http://odoochat;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_cache_bypass $http_upgrade;
        }

        ## Logging
        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log warn;
    }
}
