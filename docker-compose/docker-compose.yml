services:
  db:
    image: postgres:16
    container_name: odoo-db
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - ./db_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./backup.sh:/backup.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d odoo -h localhost"]
      interval: 10s
      retries: 10
    restart: always
    command: postgres -c listen_addresses='*'

  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    image: odoo:18
    container_name: odoo18
    depends_on:
      db:
        condition: service_healthy
    user: "101:101"   # chạy bằng user odoo
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - ./odoo_data:/var/lib/odoo  # Odoo data + attachments
      - ./addons:/mnt/extra-addons
      - ./odoo.conf:/etc/odoo/odoo.conf
      - ./entrypoint.sh:/entrypoint.sh
    entrypoint: ["/entrypoint.sh"]
    ports:
      - "8081:8069"
      - "8072:8072"
    restart: always
  nginx:
    image: nginx:1.27
    container_name: odoo-nginx
    depends_on:
      - odoo
    ports:
      - "80:8081"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx_logs:/var/log/nginx
    environment:
      - TZ=Asia/Ho_Chi_Minh
    restart: always

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/odoo18/db_data   # thư mục lưu PostgreSQL data
  odoo_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/odoo18/odoo_data  # thư mục lưu dữ liệu Odoo (attachments)

